name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# NOTE: Environment variables are set at the job level to ensure auth-dependent
# code does not crash during CI. JWT_SECRET and CLERK_SECRET_KEY are required
# by auth modules even in test environments. Security auditing should be done
# manually (bun audit is not available for all packages).

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:./ci-test.db"
      JWT_SECRET: "ci-test-jwt-secret-minimum-32-characters-long"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_placeholder"
      CLERK_SECRET_KEY: "sk_test_placeholder"
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run db:generate
      - run: bun run db:push
      - run: bun run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    env:
      DATABASE_URL: "file:./ci-test.db"
      JWT_SECRET: "ci-test-jwt-secret-minimum-32-characters-long"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_placeholder"
      CLERK_SECRET_KEY: "sk_test_placeholder"
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run db:generate
      - run: bun run db:push
      - run: bun run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    env:
      DATABASE_URL: "file:./ci-test.db"
      JWT_SECRET: "ci-test-jwt-secret-minimum-32-characters-long"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_placeholder"
      CLERK_SECRET_KEY: "sk_test_placeholder"
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run db:generate
      - run: bun run db:push
      - run: bun run build

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    env:
      DATABASE_URL: "file:./ci-test.db"
      JWT_SECRET: "ci-test-jwt-secret-minimum-32-characters-long"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_placeholder"
      CLERK_SECRET_KEY: "sk_test_placeholder"
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      # NOTE: Security auditing should be done manually.
      # `bun audit` is not available for all packages and will fail in CI.
      # Run `bun audit` locally or use a third-party security scanning tool.
